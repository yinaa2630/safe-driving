name: flutter_demo
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.3+1
  google_mlkit_face_mesh_detection: ^0.4.2
  tflite_flutter: ^0.12.1
  geolocator: ^10.1.0
  cupertino_icons: ^1.0.8
  audioplayers: ^6.5.1
  flutter_secure_storage: ^10.0.0
  http: ^1.6.0
  url_launcher: ^6.3.2
  table_calendar: ^3.0.9
  intl: ^0.19.0
  fl_chart: ^0.68.0
  flutter_riverpod: ^3.2.1
  kakao_map_sdk: ^1.2.2
  flutter_dotenv: ^5.1.0  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env                 
    - assets/marker/
    - assets/model/
    - assets/sound/

  fonts:
    - family: WantedSans
      fonts:
        - asset: assets/fonts/WantedSans-Regular.otf
          weight: 400
        - asset: assets/fonts/WantedSans-Medium.otf
          weight: 500
        - asset: assets/fonts/WantedSans-SemiBold.otf
          weight: 600
        - asset: assets/fonts/WantedSans-Bold.otf
          weight: 700